<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibidos (5)</title>
    <style>
        /* Estilos Generales */
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: #ff4d4d;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.6);
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1.1rem;
        }

        /* Contenedor de Juegos */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        /* Tarjetas de Juego */
        .game-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #ff4d4d;
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.2);
            background: #252525;
        }

        .game-card h2 {
            margin: 0;
            font-size: 1.8rem;
            color: #fff;
        }

        .game-card span {
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff4d4d;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px;
            color: #555;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .game-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Classroom games</h1>
        <p>Selecciona un juego para comenzar a jugar</p>
    </header>

    <main class="game-grid">
        <a href="https://classroomcom.github.io/Tareas-Pendientes/" class="game-card" target="_blank">
            <h2>FNAF 1</h2>
            <span>Jugar Ahora</span>
        </a>

        <a href="https://classroomcom.github.io/Classroom_Inicio/" class="game-card" target="_blank">
            <h2>FNAF 2</h2>
            <span>Jugar Ahora</span>
        </a>

        <a href="https://classroomcom.github.io/Classroom-Pendientes/" class="game-card" target="_blank">
            <h2>FNAF 3</h2>
            <span>Jugar Ahora</span>
        </a>

        <a href="https://classroomcom.github.io/Inicio-/" class="game-card" target="_blank">
            <h2>FNAF 4</h2>
            <span>Jugar Ahora</span>
        </a>
  <a href="https://classroomcom.github.io/Gmailcom/" class="game-card" target="_blank">
            <h2>Geometry Dash</h2>
            <span>Jugar Ahora</span>
        </a>

  <a href="https://classroomcom.github.io/googledocs-/" class="game-card" target="_blank">
            <h2>Ground Zero</h2>
            <span>Jugar Ahora</span>
        </a>

  <a href="https://classroomcom.github.io/Classroom-Inicio/" class="game-card" target="_blank">
            <h2>Minecraft</h2>
            <span>Jugar Ahora</span>
        </a>
      
  <a href="https://damians-eng.github.io/PlayMario/" class="game-card" target="_blank">
            <h2>Minecraft</h2>
            <span>Jugar Ahora</span>
        </a>

    </main>

    <footer>
        Responsabilidad de cada quien
    </footer>

</body>
</html>
